spring:
  application:
    name: AIComposer
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_composer
    username: root
    password: root
  # session ??
  session:
    store-type: redis
    # session 30 ???
    timeout: 2592000
  # Redis ??
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:

server:
  port: 8567
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi????
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.agent.aicomposer.controller
# knife4j???????????????
knife4j:
  enable: true
  setting:
    language: zh_cn
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false
